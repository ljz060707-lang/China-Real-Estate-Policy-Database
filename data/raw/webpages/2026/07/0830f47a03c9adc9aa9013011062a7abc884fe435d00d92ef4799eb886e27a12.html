<script type="text/javascript" src="js/fcfg/jquery.pagination.js"></script>
<script type="text/javascript">

    /**
     * @param totlePage 总页数
     * @param currentPage   当前页 1开始
     * @param pageSize  每页显示数量
     */
    function pagintion(totlePage, currentPage, pageSize,totleHits) {
        var pageNum = parseInt(totlePage / pageSize);
        if (totlePage % pageSize != 0) {
            pageNum += 1;
        }
        if (currentPage < 0){
            currentPage = 0
        }
        $('.changepage').pagination({
            pageCount: totlePage,
            current:currentPage,
            totalData: totleHits,
            showData: pageSize,
            jump: false,
            jumpBtn:'确定',
            coping: false,
            prevContent: '上一页',
            nextContent: '下一页',
            jumpBtnCls:'jump-ipt',
            callback: function (api) {
                if(api.getCurrent()>totlePage){
                    alert("共"+totlePage+"页,请输入正确页码。");
                    e.preventDefault();
                }else if(api.getCurrent()>500){
                    //alert("请输入小于200的页码。");
                    $("#page").val(1);
                    showPolicyList();
                }else{
                    $("#page").val(api.getCurrent());
                    showPolicyList();
                }
            }
        });

        displayPageInfo(totlePage);
    }

    function displayPageInfo(totlePage) {
        var pageHtml ="<span style='width: 100px;'>共&nbsp;"+totlePage+"&nbsp;页</span>";
        $(".next").after(pageHtml);
    }

</script>

    <script src="https://www.beijing.gov.cn/images/public_foot_response_2020.js"></script>
    <script>
        var pageSize = 15;
        $(function () {
            $("#page").val(1);
            $('.zcjd_top li:nth-child(3n)').css('margin-right', '0');
            var jdxs = '';
            if (jdxs != '') {
                $("#jdxs").val(jdxs);
                var html = "<a href='javascript:void(0);'>" + jdxs + "<i></i></a>";
                $(".filter-title .filter-con").append(html);
            }
            showPolicyList();

        });

        //展现政策解读文件
        function showPolicyList() {
            var ztly = $("#ztly").val();
            var jdxs = $("#jdxs").val();
            var page = $("#page").val();
            $.ajax({
                type: "post",
                url: "zcjd/policyList",
                data: {ztly: ztly,jdxs: jdxs,page:page},
                dataType: "json",
                success: function (data) {
                    // 分页调用
                    if(data.totleHits>0){
                        $(".changepage").css("display", "block");
                        pagintion(data.totlePage, data.page, pageSize,data.totleHits);
                    }else{
                        $(".changepage").css("display", "none");
                    }
                    var docList = data.docList;
                    var html = "";
                    if(docList.length>0){
                        for (var i = 0; i < docList.length; i++) {
                            if(i%5==0){
                                html+='<ul class="list">';
                            }
                            html+='<li class="col-md"><a href="'+docList[i].url+'" target="_blank" title="'+docList[i].title+'">'+docList[i].title+'</a><span>'+docList[i].docDate+'</span></li>';
                            if(i%5==4){
                                html+='</ul>';
                            }
                        }
                    }
                    $("#policyList").html(html);
                },
                error: function () {
                    console.log("请求政策文件数据失败!");
                }
            });
        }
    </script>
