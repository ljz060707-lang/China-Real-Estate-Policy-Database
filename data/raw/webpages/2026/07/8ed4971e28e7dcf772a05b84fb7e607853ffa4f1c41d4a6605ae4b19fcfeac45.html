<script>

	
	var postId = '2004368';
	var dir1 = parseInt(postId / 1000000);
	var dir2 = parseInt(postId / 1000);

$(function(){
$.ajax({
					url: '/postmeta/p/'+dir1+"/"+dir2+"/"+postId+".json",
					type: "get",

					success: function(data) {
					var gkml_url=data.gkml_url
						document.location.href = gkml_url;
					}

				});

   });
 


</script>
