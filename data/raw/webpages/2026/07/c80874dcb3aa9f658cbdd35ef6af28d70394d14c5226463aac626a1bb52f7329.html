<script type="text/javascript" src="js/fcfg/jquery.pagination.js"></script>
<script type="text/javascript">

    /**
     * @param totlePage 总页数
     * @param currentPage   当前页 1开始
     * @param pageSize  每页显示数量
     */
    function pagintion(totlePage, currentPage, pageSize,totleHits) {
        var pageNum = parseInt(totlePage / pageSize);
        if (totlePage % pageSize != 0) {
            pageNum += 1;
        }
        if (currentPage < 0){
            currentPage = 0
        }
        $('.changepage').pagination({
            pageCount: totlePage,
            current:currentPage,
            totalData: totleHits,
            showData: pageSize,
            jump: false,
            jumpBtn:'确定',
            coping: false,
            prevContent: '上一页',
            nextContent: '下一页',
            jumpBtnCls:'jump-ipt',
            callback: function (api) {
                if(api.getCurrent()>totlePage){
                    alert("共"+totlePage+"页,请输入正确页码。");
                    e.preventDefault();
                }else if(api.getCurrent()>500){
                    //alert("请输入小于200的页码。");
                    $("#page").val(1);
                    go();
                }else{
                    $("#page").val(api.getCurrent());
                    go();
                }
            }
        });
        displayPageInfo(totlePage);
    }

    function displayPageInfo(totlePage) {
        var pageHtml ="<span style='width: 70px;'>共&nbsp;"+totlePage+"&nbsp;页</span>";
        $(".next").after(pageHtml);
    }

</script>

<script type="text/javascript">
let params = {
	page: '1',
	pageSize: '25',
	sort: 'dateDesc',
}
$(function(){
    if(/AppleWebKit.*Mobile/i.test(navigator.userAgent) || (/MIDP|SymbianOS|NOKIA|SAMSUNG|LG|NEC|TCL|Alcatel|BIRD|DBTEL|Dopod|PHILIPS|HAIER|LENOVO|MOT-|Nokia|SonyEricsson|SIE-|Amoi|ZTE/.test(navigator.userAgent))){
        var swiper1 = new Swiper('.swiper1', {
            pagination: '.swiper1 .swiper-pagination',
            paginationClickable: false,
            slidesPerView: 1,
            loop: true,
            spaceBetween: 30,
            nextButton: '.swiper_box .swiper-button-next',
            prevButton: '.swiper_box .swiper-button-prev',
        });
        var swiper2 = new Swiper('.swiper2', {
            pagination: '.swiper2 .swiper-pagination',
            paginationClickable: false,
            slidesPerView: 2,
            loop: true,
            spaceBetween: 1,
            nextButton: '.swiper_box2 .swiper-button-next',
            prevButton: '.swiper_box2 .swiper-button-prev',
        });
    }else{
        var swiper1 = new Swiper('.swiper1', {
            pagination: '.swiper1 .swiper-pagination',
            paginationClickable: false,
            slidesPerView: 3,
            loop: true,
            spaceBetween: 30,
            nextButton: '.swiper_box .swiper-button-next',
            prevButton: '.swiper_box .swiper-button-prev',
        });
        var swiper2 = new Swiper('.swiper2', {
            pagination: '.swiper2 .swiper-pagination',
            paginationClickable: false,
            slidesPerView: 6,
            loop: true,
            spaceBetween: 25,
            nextButton: '.swiper_box2 .swiper-button-next',
            prevButton: '.swiper_box2 .swiper-button-prev',
        });
    }   

    $(".select_box1 span").on("click",function(event){
        $(".select_box1 ul").show();
    })
    $(".select_box2 span").on("click",function(event){
        $(".select_box2 ul").show();
    })
    $(".select_box1 li").on("click", function () {
		var i = $(".select_box1 li").index(this);
		_txt1 = $(".select_box1 li").eq(i).text();
		$(".select_box1>span").text(_txt1);
		//$(".select_box1").find("input#select_type").val(_txt1);
		$(".select_box1 span").removeClass("cur");
		$(".select_box1 ul").hide();
		return false;
	});
	$(".select_box2 li").on("click", function () {
		var i = $(".select_box2 li").index(this);
		_txt2 = $(".select_box2 li").eq(i).text();
		$(".select_box2>span").text(_txt2);
		//$(".select_box2").find("input#select_type").val(_txt2);
		$(".select_box2 span").removeClass("cur");
		$(".select_box2 ul").hide();
		return false;
	});

	/*关闭下拉框 s*/
	$(".select_box").each(function () {
		$(this).on("click", function (event) {
			event.stopPropagation();
			$(this).find("span").addClass("cur");
			$(this).addClass("z_mark");
		})
	});
	$(".g_wrap").on("click", function () {
		if ($(".select_box").hasClass("z_mark")) {
			$(".select_box ul").hide();
			$(".select_box").removeClass("z_mark");
			$(".select_box span").removeClass("cur");
		}
	})
	/*关闭下拉框 e*/
	$("#page").val(1);
	showList();
})

// 搜索调用
function go() {
	showList();
}

function showList() {
	let page = $("#page").val();
	params.page = page;
	$.ajax({
		type: "post",
		//url: "http://101.200.174.203:8089/api/webApi/1856228928464973826",
		url: "https://www.beijing.gov.cn/so/webapi/1863867819758718977",
		data: params,
		dataType: "json",
		success: function(res) {
			if(res.ok){
				let data = res.data;
				// 分页调用
				if(data.total>0){
					$(".changepage").css("display", "block");
					pagintion(Math.ceil(data.total/params.pageSize), params.page, params.pageSize,data.total);
				}else{
					$(".changepage").css("display", "none");
				}
				let docList = data.resultList;
				let html = "";
				if(docList.length>0){
					for (let i = 0; i < docList.length; i++) {
						html += '<li>';
						html += '<a href="'+docList[i].URL+'" target="_blank" title="'+docList[i].DRETITLE+'">'+docList[i].DRETITLE+'</a>';
						html += '<span>'+docList[i].DREDATE.substring(0, 10)+'</span>';
						html += '</li>';
					}
				}
				$("#list").html(html);
			}
		}
	})
}
</script>
