name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run policydb validate
      - name: Ensure raw source files are not published
        run: test ! -d data/raw || ! find data/raw -type f -print -quit | grep -q .
